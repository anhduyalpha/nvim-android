# Termux config — Recommended settings for nvim-android
# Place this file at ~/.termux/termux.properties

# ── Extra keys (useful for Neovim) ────────────────────────
# Show extra keys row above keyboard
extra-keys = [ \
  ['ESC','/','-','HOME','UP','END','PGUP'], \
  ['TAB','CTRL','ALT','LEFT','DOWN','RIGHT','PGDN'] \
]

# ── Terminal behavior ─────────────────────────────────────
# Use volume keys as extra keys
volume-keys = virtual

# ── Bell ──────────────────────────────────────────────────
bell-character = vibrate

# ── Cursor ────────────────────────────────────────────────
terminal-cursor-blink-rate = 600
terminal-cursor-style = bar

# ── Keyboard ──────────────────────────────────────────────
# Enforce character-based input for Neovim
enforce-char-based-input = true

# ── Back key ──────────────────────────────────────────────
# Back key behavior (escape is useful for Neovim)
back-key=escape

# ── Colors ────────────────────────────────────────────────
# Use 256 color palette (tokyonight needs true color)
use-black-ui = true
